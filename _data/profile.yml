short_bio: 
  I am a Master student in Computer Science at University of Science and Technology of China (USTC), under the supervision of Prof. Guangzhong Sun and Prof. Jingwei Sun. I received my Bachelor degree in the Talent Program in AI (Honor) from School of the Gifted Young, USTC in 2024. <br>
  My research interests lie broadly in designing efficient LLM Inference systems, including model compression algorithms (sparsification, quantization), sparsity in LLMs (weight, activation) and high performance sparse GPU kernels leveraging tensor cores.

